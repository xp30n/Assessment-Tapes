<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/tapes.css" />
    <title>SELECT YOUR TAPE</title>
  </head>
  <body>

    <main class="main-container">

      <div class="vhs-btns" id="vhs-btns">
        <button class="skin-btn" id="skin-btn">
          <img
            class="skin-img"
            alt="button-image"
            src="../assets/images/SKIN.PNG"
          />
        </button>

        <button type="button" class="mouth-btn" id="mouth-btn">
          <img
            class="mouth-img"
            alt="button-image"
            src="../assets/images/MOUTH.PNG"
          />
        </button>

        <button type="button" class="eyes-btn" id="eyes-btn">
          <img
            class="eyes-img"
            alt="button-image"
            src="../assets/images/EYES.PNG"
          />
        </button>

        <button type="button" class="speech-btn" id="speech-btn">
          <img
            class="speech-img"
            alt="button-image"
            src="../assets/images/SPEECH.PNG"
          />
        </button>
      </div>
      
      <script src="../js/Tapes.js"></script>
    </main>
  </body>
</html>
